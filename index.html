<script>
// ─── CẤU HÌNH ─────────────────────────────────────────────────
const COURSE_TITLE = 'Vận Hành Kho Tại Cửa Hàng';
const MIN_READ_SECONDS = 60;

// Dán URL Google Apps Script vào đây để ghi dữ liệu vào Google Sheets
// Để trống ('') nếu chưa cài đặt – dữ liệu vẫn lưu vào localStorage
const WEBHOOK_URL = '';

// Mật khẩu xem trang Admin (mở bằng URL: file.html#admin)
const ADMIN_PASSWORD = 'phuctea123';

// ─── TRACKING ─────────────────────────────────────────────────
function trackEvent(event, extra = {}) {
  const payload = {
    event,
    time: new Date().toLocaleString('vi-VN'),
    name: S.userName,
    store: S.userStore,
    ...extra
  };

  // 1. Lưu localStorage
  const key = 'phuctea_learners';
  const all = JSON.parse(localStorage.getItem(key) || '[]');
  if (event === 'register') {
    all.push({ ...payload, status: 'Đang học', score: '', duration: '', completedAt: '' });
  } else if (event === 'complete') {
    const idx = all.findIndex(r => r.name === S.userName && r.store === S.userStore);
    if (idx >= 0) {
      all[idx].status = 'Đã hoàn thành ✓';
      all[idx].score = extra.score;
      all[idx].duration = extra.duration;
      all[idx].completedAt = payload.time;
    }
  }
  localStorage.setItem(key, JSON.stringify(all));

  // 2. Gửi Google Sheets (nếu có cấu hình)
  if (WEBHOOK_URL) {
    fetch(WEBHOOK_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    }).catch(() => {});
  }
}

const LESSONS = [
{

function renderSidebar() {
  const el = document.getElementById('sidebar');
  el.innerHTML = (S.isAdmin
    ? `<div style="padding:10px 14px 6px">
        <button onclick="showAdmin()" style="width:100%;background:#1b3461;color:#fff;border:none;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:600;cursor:pointer">← Về Admin</button>
       </div>`
    : '') +
  '<div class="sidebar-title">Nội dung khóa học</div>' +
    LESSONS.map((l, i) => {
      const isDone = S.done.includes(i);
      const isActive = S.lesson === i && S.view !== 'welcome' && S.view !== 'nameform' && S.view !== 'cert' && S.view !== 'finalquiz';
      const isLocked = !S.isAdmin && i > 0 && !S.done.includes(i - 1);
      let cls = 'lesson-item';
      if (isActive) cls += ' active';
      if (isDone && !isActive) cls += ' done';
      if (isLocked) cls += ' locked';
      const status = isDone ? '✓ Hoàn thành' : (isLocked ? '🔒 Chưa mở' : 'Chưa học');
      return `<div class="${cls}" onclick="navTo(${i})">
        <div class="li-icon">${isDone && !isActive ? '✓' : i + 1}</div>
        <div class="li-info">
          <div class="li-name">${l.icon} ${l.title}</div>
          <div class="li-status">${status}</div>
        </div>
      </div>`;
    }).join('') +
    (() => {
      const allLessonsDone = S.done.length === LESSONS.length;
      const isActiveFQ = S.view === 'finalquiz';
      const isLockedFQ = !S.isAdmin && !allLessonsDone;
      let cls = 'lesson-item';
      if (isActiveFQ) cls += ' active';
      if (S.finalDone && !isActiveFQ) cls += ' done';
      if (isLockedFQ) cls += ' locked';
      const fqStatus = S.finalDone ? '✓ Hoàn thành' : (isLockedFQ ? '🔒 Hoàn thành 5 bài' : 'Sẵn sàng');
      return `<div class="${cls}" onclick="${isLockedFQ ? '' : 'showFinalQuiz()'}">
        <div class="li-icon" style="font-size:10px">${S.finalDone ? '✓' : '🏆'}</div>
        <div class="li-info">
          <div class="li-name">🏆 Kiểm Tra Tổng Kết</div>
          <div class="li-status">${fqStatus}</div>
        </div>
      </div>`;
    })();
  const totalDone = S.done.length + (S.finalDone ? 1 : 0);
  const pct = (S.done.length / LESSONS.length) * 100;
  document.getElementById('progressText').textContent = `${S.done.length}/5 bài`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function navTo(i) {
  if (i > 0 && !S.done.includes(i - 1)) return;

function startQuiz(idx) {
  S.view = 'quiz'; S.lesson = idx;
  S.qIndex = 0;
  S.qAnswers = new Array(5).fill(null);
  renderSidebar();
  renderQ();
}

function renderQ() {
  const l = LESSONS[S.lesson];
  const qi = S.qIndex;
  const q = l.questions[qi];
  const pills = l.questions.map((_,i) => {
    let c = 'qpill';
    if (i === qi) c += ' qcurrent';
    else if (S.qAnswers[i] !== null) c += ' qanswered';
    return `<div class="${c}">${i+1}</div>`;
  }).join('');
  const opts = q.opts.map((o,i) => {
    const L = ['A','B','C','D'];
    return `<div class="option" id="o${i}" onclick="pick(${i})">
      <div class="opt-letter">${L[i]}</div><div>${o}</div></div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
  <div class="quiz-header-bar">
    <div class="quiz-title-h">📝 Kiểm Tra: ${l.icon} ${l.title}</div>
    <div class="quiz-subtitle-s">Cần đúng ≥ 4/5 câu (≥70%) để qua bài</div>
    <div class="quiz-pills">${pills}</div>
  </div>
  <div class="question-card">
    <div class="q-num">Câu ${qi+1} / 5</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${opts}</div>
    <div class="feedback-box" id="fb"></div>
    <div class="quiz-nav">
      <button class="btn btn-secondary" onclick="showLesson(${S.lesson})">← Xem lại bài</button>
      <div id="navRight">
        ${qi > 0 ? `<button class="btn btn-secondary" style="margin-right:8px" onclick="prevQ()">← Câu trước</button>` : ''}
        <button class="btn btn-disabled">Chọn đáp án</button>
      </div>
    </div>
  </div>`;
  if (S.qAnswers[qi] !== null) restoreQ(qi);
}

function pick(oi) {
  const qi = S.qIndex;
  if (S.qAnswers[qi] !== null) return;
  S.qAnswers[qi] = oi;
  const q = LESSONS[S.lesson].questions[qi];
  const ok = oi === q.c;
  document.querySelectorAll('.option').forEach((el,i)=>{
    if (i === oi) el.classList.add(ok ? 'opt-correct' : 'opt-wrong');
    if (!ok && i === q.c) el.classList.add('opt-correct');
  });
  const fb = document.getElementById('fb');
  fb.style.display = 'block';
  fb.className = 'feedback-box ' + (ok ? 'fb-correct' : 'fb-wrong');
  fb.innerHTML = ok
    ? `✅ <strong>Chính xác!</strong> ${q.exp}`
    : `❌ <strong>Chưa đúng.</strong> Đáp án đúng: <strong>${q.opts[q.c]}</strong>. ${q.exp}`;
  const isLast = qi === 4;
  const prev = qi > 0 ? `<button class="btn btn-secondary" style="margin-right:8px" onclick="prevQ()">← Câu trước</button>` : '';
  document.getElementById('navRight').innerHTML = prev + (isLast
    ? `<button class="btn btn-primary" onclick="submitQuiz()">Nộp Bài ✓</button>`
    : `<button class="btn btn-primary" onclick="nextQ()">Câu Tiếp →</button>`);
}

function restoreQ(qi) {
  const q = LESSONS[S.lesson].questions[qi];
  const a = S.qAnswers[qi];
  const ok = a === q.c;
  document.querySelectorAll('.option').forEach((el,i)=>{
    if (i === a) el.classList.add(ok ? 'opt-correct' : 'opt-wrong');
    if (!ok && i === q.c) el.classList.add('opt-correct');
  });
  const fb = document.getElementById('fb');
  fb.style.display='block';
  fb.className='feedback-box '+(ok?'fb-correct':'fb-wrong');
  fb.innerHTML = ok
    ? `✅ <strong>Chính xác!</strong> ${q.exp}`
    : `❌ <strong>Chưa đúng.</strong> Đáp án đúng: <strong>${q.opts[q.c]}</strong>. ${q.exp}`;
  const isLast = qi===4;
  const prev = qi>0?`<button class="btn btn-secondary" style="margin-right:8px" onclick="prevQ()">← Câu trước</button>`:'';
  document.getElementById('navRight').innerHTML = prev+(isLast
    ?`<button class="btn btn-primary" onclick="submitQuiz()">Nộp Bài ✓</button>`
    :`<button class="btn btn-primary" onclick="nextQ()">Câu Tiếp →</button>`);
}

function nextQ() { if (S.qIndex < 4) { S.qIndex++; renderQ(); } }
function prevQ() { if (S.qIndex > 0) { S.qIndex--; renderQ(); } }

function submitQuiz() {
  const unanswered = S.qAnswers.indexOf(null);
  if (unanswered !== -1) { S.qIndex = unanswered; renderQ(); return; }
  const l = LESSONS[S.lesson];
  const correct = S.qAnswers.filter((a,i) => a === l.questions[i].c).length;
  const pct = correct / 5 * 100;
  const passed = pct >= 70;
  S.scores[S.lesson] = { correct, pct, passed };
  if (passed && !S.done.includes(S.lesson)) S.done.push(S.lesson);
  if (S.done.length === LESSONS.length && !S.completedAt) S.completedAt = new Date();
  renderSidebar();
  showResult(correct, pct, passed);
}

function showResult(correct, pct, passed) {
  S.view = 'result';
  const mi = S.lesson;
  const l = LESSONS[mi];
  const allDone = S.done.length === LESSONS.length;
  const review = l.questions.map((q,i)=>{
    const ok = S.qAnswers[i] === q.c;
    return `<div class="ans-row">
      <div class="ans-icon">${ok?'✅':'❌'}</div>
      <div><strong>Câu ${i+1}:</strong> ${q.q}<br>
      <span style="font-size:12px;color:${ok?'#059669':'#dc2626'}">${ok?'Đúng: ':'Đáp án đúng: '}${q.opts[q.c]}</span></div>
    </div>`;
  }).join('');

  let nextBtn = '';
  if (passed) {
    if (allDone) nextBtn = `<button class="btn btn-gold" onclick="showFinalQuiz()">🏆 Làm Bài Kiểm Tra Tổng Kết →</button>`;
    else if (mi < LESSONS.length-1) nextBtn = `<button class="btn btn-primary" onclick="showLesson(${mi+1})">Học Bài Tiếp →</button>`;
  } else {

  document.getElementById('mainContent').innerHTML = `

  </div>`;
  renderSidebar();
}

function showFinalQuiz() {
  if (!S.isAdmin && S.done.length < LESSONS.length) return;
  S.view = 'finalquiz';
  S.fqIndex = 0;
  S.fqAnswers = new Array(FINAL_QUIZ.length).fill(null);
  renderSidebar();
  renderFinalQ();
}

function renderFinalQ() {
  const qi = S.fqIndex;
  const q = FINAL_QUIZ[qi];
  const answered = S.fqAnswers[qi];
  document.getElementById('mainContent').innerHTML = `
  <div class="quiz-wrap">
    <div class="quiz-header">
      <div style="font-size:12px;opacity:.7;margin-bottom:4px">BÀI KIỂM TRA TỔNG KẾT – Câu ${qi+1}/${FINAL_QUIZ.length}</div>
      <div class="q-progress-wrap"><div class="q-progress-fill" style="width:${(qi/FINAL_QUIZ.length)*100}%"></div></div>
    </div>
    <div class="question-text">${q.q}</div>
    <div class="options-grid">
      ${q.opts.map((o,i)=>`<button class="opt-btn${answered===i?' selected':''}" onclick="answerFinalQ(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}
    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap">
      ${qi>0?`<button class="btn btn-secondary" onclick="S.fqIndex--;renderFinalQ()">← Câu trước</button>`:''}
      ${answered!==null ? (qi < FINAL_QUIZ.length-1
        ? `<button class="btn btn-primary" onclick="S.fqIndex++;renderFinalQ()">Câu tiếp →</button>`
        : `<button class="btn btn-gold" onclick="submitFinalQ()">✅ Nộp Bài Tổng Kết</button>`)
        : ''}
    </div>
  </div>`;
}

function answerFinalQ(idx) {
  S.fqAnswers[S.fqIndex] = idx;
  renderFinalQ();
}

function submitFinalQ() {
  const unanswered = S.fqAnswers.indexOf(null);
  if (unanswered !== -1) { S.fqIndex = unanswered; renderFinalQ(); return; }
  const correct = S.fqAnswers.filter((a,i) => a === FINAL_QUIZ[i].c).length;
  const pct = Math.round(correct / FINAL_QUIZ.length * 100);
  const passed = pct >= 70;
  S.finalScore = { correct, pct, passed };
  if (passed) { S.finalDone = true; if (!S.completedAt) S.completedAt = new Date(); }
  renderSidebar();

  const review = FINAL_QUIZ.map((q,i)=>{
    const ok = S.fqAnswers[i] === q.c;
    return `<div class="ans-row">
      <div class="ans-icon">${ok?'✅':'❌'}</div>
      <div><strong>Câu ${i+1}:</strong> ${q.q}<br>
      <span style="font-size:12px;color:${ok?'#059669':'#dc2626'}">${ok?'Đúng: ':'Đáp án đúng: '}${q.opts[q.c]}</span>
      ${!ok?`<br><span style="font-size:11px;color:#888">${q.exp}</span>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
  <div class="result-card">
    <div class="result-icon">${passed?'🏆':'😅'}</div>
    <div class="result-score ${passed?'score-pass':'score-fail'}">${correct}/${FINAL_QUIZ.length}</div>
    <div class="result-msg">${passed?'Xuất sắc! Bạn đã hoàn thành khóa học!':'Chưa đạt – hãy ôn lại và làm lại'}</div>
    <div class="result-sub">
      Bạn trả lời đúng <strong>${correct}/${FINAL_QUIZ.length} câu (${pct}%)</strong>.<br>
      ${passed?'✅ Chúc mừng! Bạn đủ điều kiện nhận Giấy Chứng Nhận.':'❌ Cần ít nhất 7/10 câu đúng (≥70%). Hãy ôn lại kiến thức và làm lại.'}
    </div>
    <div class="ans-review"><h3 style="margin-bottom:10px;color:var(--green-deeper)">Chi tiết kết quả:</h3>${review}</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="showFinalQuiz()">📖 Làm Lại Tổng Kết</button>
      ${passed?`<button class="btn btn-gold" onclick="makeCert()">🏆 Nhận Giấy Chứng Nhận</button>`:''}
    </div>
  </div>`;
  renderSidebar();
}

function makeCert() {
  // Thông tin đã thu thập từ form đăng ký, dùng trực tiếp
  S.view = 'cert';

  // Tính tổng điểm & thời gian
  const totalCorrect = Object.values(S.scores).reduce((a,b)=>a+(b.correct||0),0);
  const totalQ = LESSONS.length * 5;
  const avgPct = Math.round(totalCorrect / totalQ * 100);
  let duration = '';
  if (S.courseStart && S.completedAt) {
    const ms = S.completedAt - S.courseStart;
    const mins = Math.floor(ms/60000);
    if (mins < 60) duration = `${mins} phút`;
    else duration = `${Math.floor(mins/60)} giờ ${mins%60} phút`;
  }
  const completedAt = new Date().toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit',year:'numeric'});
  S._certStats = { totalCorrect, totalQ, avgPct, duration, completedAt };

  // Ghi nhận hoàn thành
  trackEvent('complete', { score: avgPct, duration });

  document.getElementById('mainContent').innerHTML = `
  <div class="cert-wrap">
    <div class="cert-title-bar">
      <h2>🏆 Giấy Chứng Nhận Của Bạn</h2>
      <p>Nhấn "Tải về" để lưu dưới dạng ảnh PNG</p>
    </div>
    <canvas id="certCanvas" width="1200" height="860"></canvas>
    <div class="cert-actions">
      <button class="btn btn-secondary" onclick="showWelcome()">← Về Trang Chủ</button>
      <button class="btn btn-gold" onclick="dlCert()">⬇️ Tải PNG</button>
      <button class="btn btn-primary" onclick="printCert()">🖨️ In Chứng Nhận</button>
    </div>
  </div>`;
  drawCert();
  renderSidebar();
}

function drawCert() {
  const cv = document.getElementById('certCanvas');
  const W = 960, H = 672;
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const img = new Image();
  img.onload  = () => _finishCert(ctx, W, H, img);
  img.onerror = () => _finishCert(ctx, W, H, null);
  img.src = 'logo-phuc-tea.png';
}

function _certDiamond(ctx, x, y, s, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y-s); ctx.lineTo(x+s, y); ctx.lineTo(x, y+s); ctx.lineTo(x-s, y);
  ctx.closePath(); ctx.fill();
}

function _certTrophy_UNUSED(ctx, cx, cy, gold, goldL) {
  // Cup body
  ctx.fillStyle = gold;
  ctx.beginPath();
  ctx.moveTo(cx-22, cy-44); ctx.lineTo(cx+22, cy-44);
  ctx.bezierCurveTo(cx+30, cy-20, cx+20, cy+8, cx, cy+8);
  ctx.bezierCurveTo(cx-20, cy+8, cx-30, cy-20, cx-22, cy-44);
  ctx.fill();
  // Handles
  ctx.strokeStyle = goldL; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(cx-26, cy-18, 9, 0.6*Math.PI, 1.4*Math.PI); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx+26, cy-18, 9, -0.4*Math.PI, 0.4*Math.PI); ctx.stroke();
  // Stem
  ctx.fillStyle = goldL;
  ctx.fillRect(cx-5, cy+8, 10, 18);
  // Base
  ctx.fillStyle = gold;
  ctx.beginPath(); ctx.roundRect(cx-18, cy+26, 36, 10, 4); ctx.fill();
  // Stars
  [0].forEach(() => {
    const sr = 8;
    ctx.fillStyle = goldL;
    ctx.beginPath();
    for (let i=0;i<5;i++) {
      const a = (i*4*Math.PI/5) - Math.PI/2;
      const [px,py] = [cx+sr*Math.cos(a), cy-52+sr*Math.sin(a)];
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill();
  });
}

function _certGeomDeco_UNUSED(ctx, cx, cy, gold, goldL) {
  [[44,30,0,0],[34,22,10,-10],[24,14,20,-22]].forEach(([w,h,ox,oy],i) => {
    ctx.save();
    ctx.translate(cx+ox, cy+oy);
    ctx.rotate(0.18 - i*0.06);
    ctx.fillStyle = i%2===0 ? gold : goldL;
    ctx.globalAlpha = 0.85;
    ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,3); ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

function _finishCert(ctx, W, H, logoImg) {
  const st = S._certStats;
  const green='#1a6b42', greenD='#0f5c2b', greenL='#2ecc71', gold='#c8951c', goldL='#e8b84b', white='#fff', lightMint='#f0fbf4';
  ctx.textAlign = 'center';

  // ── BACKGROUND ──
  ctx.fillStyle = white; ctx.fillRect(0, 0, W, H);

  // ── OUTER BORDER (double line) ──
  ctx.strokeStyle = green; ctx.lineWidth = 8;
  ctx.strokeRect(14, 14, W-28, H-28);
  ctx.strokeStyle = gold; ctx.lineWidth = 2;
  ctx.strokeRect(24, 24, W-48, H-48);

  // ── TOP BAND ──
  ctx.fillStyle = greenD; ctx.fillRect(14, 14, W-28, 114);
  ctx.fillStyle = gold; ctx.fillRect(14, 128, W-28, 3);

  // ── LOGO in band ──
  const lsz = 90;
  if (logoImg) {
    ctx.drawImage(logoImg, W/2-lsz/2, 14+(114-lsz)/2, lsz, lsz);
  } else {
    ctx.fillStyle = gold; ctx.font = 'bold 22px Arial';
    ctx.fillText('PHÚC TEA', W/2, 80);
  }

  // ── GIẤY CHỨNG NHẬN ──
  ctx.fillStyle = greenD; ctx.font = 'bold 48px Arial';
  ctx.fillText('GIẤY CHỨNG NHẬN', W/2, 194);

  // Gold decorative lines
  ctx.strokeStyle = gold; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(160, 208); ctx.lineTo(W-160, 208); ctx.stroke();
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(200, 214); ctx.lineTo(W-200, 214); ctx.stroke();

  // ── SUBTITLE ──
  ctx.fillStyle = '#666'; ctx.font = '14px Georgia,serif';
  ctx.fillText('Trân trọng ghi nhận thành tích hoàn thành khóa học', W/2, 240);

  // ── COURSE NAME ──
  ctx.fillStyle = greenD; ctx.font = 'bold 16px Arial';
  ctx.fillText('"' + COURSE_TITLE + '"', W/2, 268);
  ctx.fillStyle = '#999'; ctx.font = '12px Arial';
  ctx.fillText('Hệ Thống Đào Tạo Phúc Tea – Chuỗi Cung Ứng 2026', W/2, 288);

  // ── DIVIDER ──
  ctx.strokeStyle = gold; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(160, 308); ctx.lineTo(W-160, 308); ctx.stroke();

  // ── PRESENTED TO ──
  ctx.fillStyle = '#999'; ctx.font = 'italic 13px Georgia,serif';
  ctx.fillText('Chứng nhận trao cho', W/2, 338);

  // ── STUDENT NAME ──
  ctx.fillStyle = gold; ctx.font = 'bold 44px Georgia,serif';
  ctx.fillText(S.userName.toUpperCase(), W/2, 392);
  const nw = ctx.measureText(S.userName.toUpperCase()).width;
  ctx.strokeStyle = gold; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2-nw/2, 403); ctx.lineTo(W/2+nw/2, 403); ctx.stroke();

  // Store
  ctx.fillStyle = '#888'; ctx.font = '13px Arial';
  ctx.fillText('Cửa hàng: ' + (S.userStore || ''), W/2, 425);

  // ── DIVIDER ──
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(160, 444); ctx.lineTo(W-160, 444); ctx.stroke();

  // ── STATS ROW ──
  const sY=454, sW=158, sH=48, sG=14;
  const sStart = W/2 - (4*sW+3*sG)/2;
  const stats = [
    [st.totalCorrect+'/'+st.totalQ,'Câu đúng tổng cộng'],
    [st.avgPct+'%','Điểm trung bình'],
    [st.duration||'—','Thời gian học'],
    ['5/5','Bài hoàn thành']
  ];
  stats.forEach(([val,lbl],i) => {
    const bx = sStart + i*(sW+sG);
    ctx.fillStyle = lightMint;
    ctx.beginPath(); ctx.roundRect(bx, sY, sW, sH, 6); ctx.fill();
    ctx.strokeStyle = '#b2dfcb'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = green; ctx.font = 'bold 20px Arial';
    ctx.fillText(val, bx+sW/2, sY+26);
    ctx.fillStyle = '#999'; ctx.font = '10px Arial';
    ctx.fillText(lbl, bx+sW/2, sY+41);
  });

  // ── DATE ──
  const completedDate = st.completedAt || new Date().toLocaleDateString('vi-VN');
  ctx.fillStyle = '#aaa'; ctx.font = 'italic 13px Georgia,serif';
  ctx.fillText('Ngày hoàn thành: ' + completedDate, W/2, 524);

  // ── SIGNATURES ──
  const sigY=556, lx=210, rx=W-210;
  [lx, rx].forEach((x, i) => {
    ctx.fillStyle = greenD; ctx.font = 'italic 18px Georgia,serif';
    ctx.fillText('Đã ký', x, sigY);
    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x-70, sigY+14); ctx.lineTo(x+70, sigY+14); ctx.stroke();
    ctx.fillStyle = greenD; ctx.font = 'bold 13px Arial';
    ctx.fillText(i===0?'Lý Tấn Tài':'Trần Thị Hạnh Nhân', x, sigY+30);
    ctx.fillStyle = '#aaa'; ctx.font = '11px Arial';
    ctx.fillText(i===0?'Giám đốc Điều Hành':'Quản lý Chuỗi Cung Ứng', x, sigY+44);
  });

  // ── BOTTOM BAND ──
  ctx.fillStyle = gold; ctx.fillRect(14, H-46, W-28, 3);
  ctx.fillStyle = greenD; ctx.fillRect(14, H-43, W-28, 29);
  ctx.fillStyle = white; ctx.font = '10px Arial';
  ctx.fillText('PHÚC TEA® – HỆ THỐNG ĐÀO TẠO CHUỖI CUNG ỨNG 2026', W/2, H-24);
}

      <td style="padding:10px 8px;text-align:center">
        <button onclick="deleteEntry(${i})"
          style="background:#fee2e2;border:none;color:#dc2626;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:12px">Xoá</button>
      </td>
    </tr>`).join('') :
    `<tr><td colspan="9" style="text-align:center;padding:48px;color:#9ca3af">
      <div style="font-size:32px;margin-bottom:8px">📭</div>
      Chưa có học viên nào đăng ký
    </td></tr>`;

  document.getElementById('sidebar').innerHTML = '';
  document.getElementById('progressText').textContent = `${done}/${total} hoàn thành`;
  document.getElementById('progressFill').style.width = total ? (done/total*100)+'%' : '0%';

  document.getElementById('mainContent').innerHTML = `
  <div style="display:flex;flex-direction:column;gap:16px">

    <!-- HEADER -->
    <div style="background:#fff;border-radius:16px;padding:24px 28px;box-shadow:0 2px 16px rgba(0,0,0,.06)">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px">
        <div>
          <h2 style="font-size:20px;color:#0f5c2b;margin:0">📊 Quản Lý Học Viên</h2>
          <p style="color:#6b7280;font-size:13px;margin:4px 0 0">Khóa học: <strong>${COURSE_TITLE}</strong></p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="exportCSV()">⬇️ Xuất CSV</button>
          <button class="btn btn-primary" style="background:#1b3461" onclick="adminPreview()">👁️ Xem Khóa Học</button>
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ Xoá Tất Cả</button>
          <button class="btn btn-secondary" onclick="exitAdmin()">← Thoát Admin</button>
        </div>
      </div>
      <!-- Stat cards -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px">
        <div style="background:linear-gradient(135deg,#0f5c2b,#1a8a42);border-radius:12px;padding:16px;text-align:center;color:#fff">
          <div style="font-size:32px;font-weight:800">${total}</div>
          <div style="font-size:12px;opacity:.85;margin-top:2px">Đã đăng ký</div>
        </div>
        <div style="background:linear-gradient(135deg,#065f46,#059669);border-radius:12px;padding:16px;text-align:center;color:#fff">
          <div style="font-size:32px;font-weight:800">${done}</div>
          <div style="font-size:12px;opacity:.85;margin-top:2px">Hoàn thành</div>
        </div>
        <div style="background:linear-gradient(135deg,#92400e,#d97706);border-radius:12px;padding:16px;text-align:center;color:#fff">
          <div style="font-size:32px;font-weight:800">${studying}</div>
          <div style="font-size:12px;opacity:.85;margin-top:2px">Đang học</div>
        </div>
        <div style="background:linear-gradient(135deg,#1e40af,#3b82f6);border-radius:12px;padding:16px;text-align:center;color:#fff">
          <div style="font-size:32px;font-weight:800">${total?Math.round(done/total*100):0}%</div>
          <div style="font-size:12px;opacity:.85;margin-top:2px">Tỉ lệ hoàn thành</div>
        </div>
        <div style="background:linear-gradient(135deg,#5b21b6,#8b5cf6);border-radius:12px;padding:16px;text-align:center;color:#fff">
          <div style="font-size:32px;font-weight:800">${avgScore}%</div>
          <div style="font-size:12px;opacity:.85;margin-top:2px">Điểm TB</div>
        </div>
      </div>
    </div>

    <!-- BIỂU ĐỒ -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <!-- Donut -->
      <div style="background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 2px 16px rgba(0,0,0,.06)">
        <h3 style="font-size:14px;font-weight:700;color:#374151;margin:0 0 14px">🍩 Tỉ lệ tiến độ học</h3>
        <canvas id="chartDonut" style="max-height:220px"></canvas>
      </div>
      <!-- Bar đăng ký theo ngày -->
      <div style="background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 2px 16px rgba(0,0,0,.06)">
        <h3 style="font-size:14px;font-weight:700;color:#374151;margin:0 0 14px">📅 Đăng ký theo ngày</h3>
        <canvas id="chartDay" style="max-height:220px"></canvas>
      </div>
    </div>
    ${storeLabels.length > 0 ? `
    <!-- Bar điểm theo cửa hàng -->
    <div style="background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 2px 16px rgba(0,0,0,.06)">
      <h3 style="font-size:14px;font-weight:700;color:#374151;margin:0 0 14px">🏪 Điểm trung bình theo cửa hàng</h3>
      <canvas id="chartStore" style="max-height:200px"></canvas>
    </div>` : ''}

    <!-- BẢNG -->
    <div style="background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 2px 16px rgba(0,0,0,.06)">
      <h3 style="font-size:14px;font-weight:700;color:#374151;margin:0 0 14px">📋 Danh sách học viên</h3>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:800px">
          <thead>
            <tr style="background:#f9fafb;border-bottom:2px solid #e5e7eb">
              <th style="padding:10px 8px;color:#6b7280;font-weight:600">#</th>
              <th style="padding:10px 12px;text-align:left;color:#6b7280;font-weight:600">Họ tên</th>
              <th style="padding:10px 12px;text-align:left;color:#6b7280;font-weight:600">Cửa hàng</th>
              <th style="padding:10px 12px;text-align:left;color:#6b7280;font-weight:600">Đăng ký lúc</th>
              <th style="padding:10px 12px;text-align:left;color:#6b7280;font-weight:600">Trạng thái</th>
              <th style="padding:10px 8px;color:#6b7280;font-weight:600">Điểm TB</th>
              <th style="padding:10px 12px;text-align:left;color:#6b7280;font-weight:600">TG học</th>
              <th style="padding:10px 12px;text-align:left;color:#6b7280;font-weight:600">Hoàn thành lúc</th>
              <th style="padding:10px 8px"></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  </div>`;

  // Vẽ biểu đồ sau khi DOM render
  requestAnimationFrame(() => {
    // Donut
    new Chart(document.getElementById('chartDonut'), {
      type: 'doughnut',
      data: {
        labels: ['Hoàn thành', 'Đang học'],
        datasets: [{ data: [done, studying],
          backgroundColor: ['#1a8a42','#fbbf24'],
          borderWidth: 0, hoverOffset: 6 }]
      },
      options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 12 } } } }, cutout: '65%' }
    });
    // Bar theo ngày
    new Chart(document.getElementById('chartDay'), {
      type: 'bar',
      data: {
        labels: dayLabels.length ? dayLabels : ['Chưa có dữ liệu'],
        datasets: [{ label: 'Đăng ký', data: dayLabels.length ? dayVals : [0],
          backgroundColor: '#1a8a42', borderRadius: 6 }]
      },
      options: { plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { ticks: { font: { size: 10 } } } } }
    });
    // Bar theo cửa hàng
    if (storeLabels.length && document.getElementById('chartStore')) {
      new Chart(document.getElementById('chartStore'), {
        type: 'bar',
        data: {
          labels: storeLabels,
          datasets: [{ label: 'Điểm TB (%)', data: storeAvgs,
            backgroundColor: storeAvgs.map(v => v>=80?'#1a8a42':v>=60?'#fbbf24':'#ef4444'),
            borderRadius: 6 }]
        },
        options: { plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v=>v+'%' } },
            x: { ticks: { font: { size: 10 } } } } }
      });
    }
  });
}

function deleteEntry(idx) {
  if (!confirm('Xoá học viên này?')) return;
  const all = JSON.parse(localStorage.getItem('phuctea_learners') || '[]');
  all.splice(idx, 1);
  localStorage.setItem('phuctea_learners', JSON.stringify(all));
  showAdmin();
}

function clearAll() {
  if (!confirm('Xoá toàn bộ dữ liệu học viên? Không thể hoàn tác!')) return;
  localStorage.removeItem('phuctea_learners');
  showAdmin();
}

function exportCSV() {
  const all = JSON.parse(localStorage.getItem('phuctea_learners') || '[]');
  if (!all.length) { alert('Chưa có dữ liệu!'); return; }
  const header = ['Họ tên','Cửa hàng','Đăng ký lúc','Trạng thái','Điểm TB','Thời gian học','Hoàn thành lúc'];
  const rows = all.map(r => [r.name,r.store,r.time,r.status,r.score,r.duration,r.completedAt]
    .map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = '\uFEFF' + [header.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
  a.download = `phuctea-hocvien-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ─── INIT ─────────────────────────────────────────────────────
if (location.hash === '#admin') showAdmin();
else showRegister();
</script>
</body>
</html>
