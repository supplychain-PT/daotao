<script>
// ─── CẤU HÌNH ─────────────────────────────────────────────────
const COURSE_TITLE = 'Vận Hành Kho Tại Cửa Hàng';
const MIN_READ_SECONDS = 60;

// Dán URL Google Apps Script vào đây để ghi dữ liệu vào Google Sheets
// Để trống ('') nếu chưa cài đặt – dữ liệu vẫn lưu vào localStorage
const WEBHOOK_URL = '';

// Mật khẩu xem trang Admin (mở bằng URL: file.html#admin)
const ADMIN_PASSWORD = 'phuctea2026';

// ─── TRACKING ─────────────────────────────────────────────────
function trackEvent(event, extra = {}) {
  const payload = {
    event,
    time: new Date().toLocaleString('vi-VN'),
    name: S.userName,
    email: S.userEmail,
    store: S.userStore,
    ...extra
  };

  // 1. Lưu localStorage
  const key = 'phuctea_learners';
  const all = JSON.parse(localStorage.getItem(key) || '[]');
  if (event === 'register') {
    all.push({ ...payload, status: 'Đang học', score: '', duration: '', completedAt: '' });
  } else if (event === 'complete') {
    const idx = all.findIndex(r => r.email === S.userEmail);
    if (idx >= 0) {
      all[idx].status = 'Đã hoàn thành ✓';
      all[idx].score = extra.score;
      all[idx].duration = extra.duration;
      all[idx].completedAt = payload.time;
    }
  }
  localStorage.setItem(key, JSON.stringify(all));

  // 2. Gửi Google Sheets (nếu có cấu hình)
  if (WEBHOOK_URL) {
    fetch(WEBHOOK_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    }).catch(() => {});
  }
}

{

  subtitle:'Mục đích, phạm vi & vai trò',
  content:`

// ─── TIMER ──────────────────────────────────────────────────────
let readTimer = null;
let readLeft = MIN_READ_SECONDS;

function startReadTimer(lessonId) {
  if (S.readDone[lessonId]) { enableQuizBtn(); return; }
  readLeft = MIN_READ_SECONDS;
  if (readTimer) clearInterval(readTimer);
  renderTimerBar();
  readTimer = setInterval(() => {
    readLeft--;
    renderTimerBar();
    if (readLeft <= 0) {
      clearInterval(readTimer);
      S.readDone[lessonId] = true;
      enableQuizBtn();
    }
  }, 1000);
}

function renderTimerBar() {
  const el = document.getElementById('timerBar');
  if (!el) return;
  const pct = Math.min(100, ((MIN_READ_SECONDS - readLeft) / MIN_READ_SECONDS) * 100);
  if (readLeft > 0) {
    const m = Math.floor(readLeft / 60), s = readLeft % 60;
    el.className = 'timer-bar';
    el.innerHTML = `<span style="font-size:18px">⏱</span>
      <div class="timer-progress-wrap"><div class="timer-progress-fill" style="width:${pct}%"></div></div>
      <span class="timer-text">Thời gian học tối thiểu: ${m}:${s.toString().padStart(2,'0')} còn lại</span>`;
  } else {
    el.className = 'timer-bar done-read';
    el.innerHTML = `<span style="font-size:18px">✅</span>
      <div class="timer-progress-wrap"><div class="timer-progress-fill" style="width:100%"></div></div>
      <span class="timer-text" style="color:var(--green-dark)">Đã đọc đủ! Bạn có thể làm bài kiểm tra.</span>`;
  }
}

function enableQuizBtn() {
  const btn = document.getElementById('quizBtn');
  if (!btn) return;
  btn.className = 'btn btn-primary';
  btn.onclick = () => startQuiz(S.lesson);
  btn.innerHTML = '📝 Làm Bài Kiểm Tra →';
}

// ─── SIDEBAR ──────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('sidebar');
  el.innerHTML = '<div class="sidebar-title">Nội dung khóa học</div>' +
    LESSONS.map((l, i) => {
      const isDone = S.done.includes(i);
      const isActive = S.lesson === i && S.view !== 'welcome' && S.view !== 'nameform' && S.view !== 'cert';
      const isLocked = i > 0 && !S.done.includes(i - 1);
      let cls = 'lesson-item';
      if (isActive) cls += ' active';
      if (isDone && !isActive) cls += ' done';
      if (isLocked) cls += ' locked';
      const status = isDone ? '✓ Hoàn thành' : (isLocked ? '🔒 Chưa mở' : 'Chưa học');
      return `<div class="${cls}" onclick="navTo(${i})">
        <div class="li-icon">${isDone && !isActive ? '✓' : i + 1}</div>
        <div class="li-info">
          <div class="li-name">${l.icon} ${l.title}</div>
          <div class="li-status">${status}</div>
        </div>
      </div>`;
    }).join('');
  const pct = (S.done.length / LESSONS.length) * 100;
  document.getElementById('progressText').textContent = `${S.done.length}/6 bài`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function navTo(i) {
  if (i > 0 && !S.done.includes(i - 1)) return;
  S.lesson = i;
  showLesson(i);
}

// ─── VIEWS ────────────────────────────────────────────────────
function showWelcome() {
  if (readTimer) clearInterval(readTimer);
  S.view = 'welcome'; S.lesson = 0;
  renderSidebar();
  document.getElementById('mainContent').innerHTML = `
  <div class="welcome">
    <img src="logo-phuc-tea.png" class="welcome-logo-big" alt="Phúc Tea"
      onerror="this.style.display='none'">
    <h2>Chào Mừng Đến Khóa Học</h2>
    <h3>${COURSE_TITLE}</h3>
    <p>Dành riêng cho <strong>Đối Tác Nhượng Quyền</strong> và <strong>Quản Lý Cửa Hàng</strong> Phúc Tea.<br>Hoàn thành toàn bộ 6 bài học để nhận <strong>Giấy Chứng Nhận</strong>.</p>
    <div class="welcome-stats">
      <div class="stat"><div class="stat-num">6</div><div class="stat-label">Bài học</div></div>
      <div class="stat"><div class="stat-num">30</div><div class="stat-label">Câu hỏi</div></div>
      <div class="stat"><div class="stat-num">70%</div><div class="stat-label">Điểm đạt/bài</div></div>
      <div class="stat"><div class="stat-num">1'</div><div class="stat-label">Học tối thiểu/bài</div></div>
    </div>
    <div class="info-box">
      <strong>📌 Quy tắc:</strong><br>
      • Mỗi bài học yêu cầu <strong>đọc tối thiểu 1 phút</strong> trước khi làm bài kiểm tra<br>
      • Mỗi bài có <strong>5 câu hỏi</strong> – cần đúng ≥ 4 câu (≥70%) để qua<br>
      • Chưa qua bài hiện tại → <strong>không thể học bài tiếp theo</strong><br>
      • Hoàn thành 6/6 bài → nhận <strong>Giấy Chứng Nhận</strong>
    </div>
    <button class="btn btn-primary" onclick="showLesson(0)" style="font-size:15px;padding:13px 36px">🚀 Bắt Đầu Học</button>
  </div>`;
}

function showLesson(idx) {
  if (!S.courseStart) S.courseStart = new Date();
  if (readTimer) clearInterval(readTimer);
  S.view = 'lesson'; S.lesson = idx;
  const l = LESSONS[idx];
  renderSidebar();
  const alreadyRead = S.readDone[idx];
  const prevBtn = idx > 0
    ? `<button class="btn btn-secondary" onclick="showLesson(${idx-1})">← Bài trước</button>`
    : `<button class="btn btn-secondary" onclick="showWelcome()">← Trang chủ</button>`;

  document.getElementById('mainContent').innerHTML = `
  <div>
    <div class="lesson-header">
      <div class="lesson-num">Bài ${idx + 1} / ${LESSONS.length}</div>
      <div class="lesson-title">${l.icon} ${l.title}</div>
    </div>
    <div class="lesson-body">
      <div class="timer-bar" id="timerBar"></div>
      ${l.content}
      <hr class="divider">
      <div class="lesson-actions">
        ${prevBtn}
        <button id="quizBtn" class="btn btn-disabled" onclick="">📝 Làm Bài Kiểm Tra →</button>
      </div>
    </div>
  </div>`;
  startReadTimer(idx);
}

function startQuiz(idx) {
  if (readTimer) clearInterval(readTimer);
  S.view = 'quiz'; S.lesson = idx;
  S.qIndex = 0;
  S.qAnswers = new Array(5).fill(null);
  renderSidebar();
  renderQ();
}

function renderQ() {
  const l = LESSONS[S.lesson];
  const qi = S.qIndex;
  const q = l.questions[qi];
  const pills = l.questions.map((_,i) => {
    let c = 'qpill';
    if (i === qi) c += ' qcurrent';
    else if (S.qAnswers[i] !== null) c += ' qanswered';
    return `<div class="${c}">${i+1}</div>`;
  }).join('');
  const opts = q.opts.map((o,i) => {
    const L = ['A','B','C','D'];
    return `<div class="option" id="o${i}" onclick="pick(${i})">
      <div class="opt-letter">${L[i]}</div><div>${o}</div></div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
  <div class="quiz-header-bar">
    <div class="quiz-title-h">📝 Kiểm Tra: ${l.icon} ${l.title}</div>
    <div class="quiz-subtitle-s">Cần đúng ≥ 4/5 câu (≥70%) để qua bài</div>
    <div class="quiz-pills">${pills}</div>
  </div>
  <div class="question-card">
    <div class="q-num">Câu ${qi+1} / 5</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${opts}</div>
    <div class="feedback-box" id="fb"></div>
    <div class="quiz-nav">
      <button class="btn btn-secondary" onclick="showLesson(${S.lesson})">← Xem lại bài</button>
      <div id="navRight">
        ${qi > 0 ? `<button class="btn btn-secondary" style="margin-right:8px" onclick="prevQ()">← Câu trước</button>` : ''}
        <button class="btn btn-disabled">Chọn đáp án</button>
      </div>
    </div>
  </div>`;
  if (S.qAnswers[qi] !== null) restoreQ(qi);
}

function pick(oi) {
  const qi = S.qIndex;
  if (S.qAnswers[qi] !== null) return;
  S.qAnswers[qi] = oi;
  const q = LESSONS[S.lesson].questions[qi];
  const ok = oi === q.c;
  document.querySelectorAll('.option').forEach((el,i)=>{
    if (i === oi) el.classList.add(ok ? 'opt-correct' : 'opt-wrong');
    if (!ok && i === q.c) el.classList.add('opt-correct');
  });
  const fb = document.getElementById('fb');
  fb.style.display = 'block';
  fb.className = 'feedback-box ' + (ok ? 'fb-correct' : 'fb-wrong');
  fb.innerHTML = ok
    ? `✅ <strong>Chính xác!</strong> ${q.exp}`
    : `❌ <strong>Chưa đúng.</strong> Đáp án đúng: <strong>${q.opts[q.c]}</strong>. ${q.exp}`;
  const isLast = qi === 4;
  const prev = qi > 0 ? `<button class="btn btn-secondary" style="margin-right:8px" onclick="prevQ()">← Câu trước</button>` : '';
  document.getElementById('navRight').innerHTML = prev + (isLast
    ? `<button class="btn btn-primary" onclick="submitQuiz()">Nộp Bài ✓</button>`
    : `<button class="btn btn-primary" onclick="nextQ()">Câu Tiếp →</button>`);
}

function restoreQ(qi) {
  const q = LESSONS[S.lesson].questions[qi];
  const a = S.qAnswers[qi];
  const ok = a === q.c;
  document.querySelectorAll('.option').forEach((el,i)=>{
    if (i === a) el.classList.add(ok ? 'opt-correct' : 'opt-wrong');
    if (!ok && i === q.c) el.classList.add('opt-correct');
  });
  const fb = document.getElementById('fb');
  fb.style.display='block';
  fb.className='feedback-box '+(ok?'fb-correct':'fb-wrong');
  fb.innerHTML = ok
    ? `✅ <strong>Chính xác!</strong> ${q.exp}`
    : `❌ <strong>Chưa đúng.</strong> Đáp án đúng: <strong>${q.opts[q.c]}</strong>. ${q.exp}`;
  const isLast = qi===4;
  const prev = qi>0?`<button class="btn btn-secondary" style="margin-right:8px" onclick="prevQ()">← Câu trước</button>`:'';
  document.getElementById('navRight').innerHTML = prev+(isLast
    ?`<button class="btn btn-primary" onclick="submitQuiz()">Nộp Bài ✓</button>`
    :`<button class="btn btn-primary" onclick="nextQ()">Câu Tiếp →</button>`);
}

function nextQ() { if (S.qIndex < 4) { S.qIndex++; renderQ(); } }
function prevQ() { if (S.qIndex > 0) { S.qIndex--; renderQ(); } }

function submitQuiz() {
  const unanswered = S.qAnswers.indexOf(null);
  if (unanswered !== -1) { S.qIndex = unanswered; renderQ(); return; }
  const l = LESSONS[S.lesson];
  const correct = S.qAnswers.filter((a,i) => a === l.questions[i].c).length;
  const pct = correct / 5 * 100;
  const passed = pct >= 70;
  S.scores[S.lesson] = { correct, pct, passed };
  if (passed && !S.done.includes(S.lesson)) S.done.push(S.lesson);
  if (S.done.length === LESSONS.length && !S.completedAt) S.completedAt = new Date();
  renderSidebar();
  showResult(correct, pct, passed);
}

function showResult(correct, pct, passed) {
  S.view = 'result';
  const mi = S.lesson;
  const l = LESSONS[mi];
  const allDone = S.done.length === LESSONS.length;
  const review = l.questions.map((q,i)=>{
    const ok = S.qAnswers[i] === q.c;
    return `<div class="ans-row">
      <div class="ans-icon">${ok?'✅':'❌'}</div>
      <div><strong>Câu ${i+1}:</strong> ${q.q}<br>
      <span style="font-size:12px;color:${ok?'#059669':'#dc2626'}">${ok?'Đúng: ':'Đáp án đúng: '}${q.opts[q.c]}</span></div>
    </div>`;
  }).join('');

  let nextBtn = '';
  if (passed) {
    if (allDone) nextBtn = `<button class="btn btn-gold" onclick="makeCert()">🏆 Nhận Giấy Chứng Nhận</button>`;
    else if (mi < LESSONS.length-1) nextBtn = `<button class="btn btn-primary" onclick="showLesson(${mi+1})">Học Bài Tiếp →</button>`;
  } else {
    nextBtn = `<button class="btn btn-primary" onclick="showLesson(${mi})">📖 Ôn Lại & Làm Lại</button>`;
  }

  document.getElementById('mainContent').innerHTML = `
  <div class="result-card">
    <div class="result-icon">${passed?'🎉':'😅'}</div>
    <div class="result-score ${passed?'score-pass':'score-fail'}">${correct}/5</div>
    <div class="result-msg">${passed?'Xuất sắc! Bạn đã qua bài này!':'Chưa đạt – cần ôn lại và làm lại'}</div>
    <div class="result-sub">
      Bạn trả lời đúng <strong>${correct}/5 câu (${pct.toFixed(0)}%)</strong>.<br>
      ${passed?'✅ Điểm đạt yêu cầu ≥70%.':'❌ Cần ít nhất 4/5 câu đúng. Hãy đọc kỹ lý thuyết trước khi làm lại.'}
    </div>
    <div class="ans-review"><h3 style="margin-bottom:10px;color:var(--green-deeper)">Chi tiết kết quả:</h3>${review}</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="showLesson(${mi})">📖 Xem Lại Bài</button>
      ${nextBtn}
    </div>
  </div>`;
  renderSidebar();
}

function makeCert() {
  // Thông tin đã thu thập từ form đăng ký, dùng trực tiếp
  S.view = 'cert';

  // Tính tổng điểm & thời gian
  const totalCorrect = Object.values(S.scores).reduce((a,b)=>a+(b.correct||0),0);
  const totalQ = LESSONS.length * 5;
  const avgPct = Math.round(totalCorrect / totalQ * 100);
  let duration = '';
  if (S.courseStart && S.completedAt) {
    const ms = S.completedAt - S.courseStart;
    const mins = Math.floor(ms/60000);
    if (mins < 60) duration = `${mins} phút`;
    else duration = `${Math.floor(mins/60)} giờ ${mins%60} phút`;
  }
  S._certStats = { totalCorrect, totalQ, avgPct, duration };

  // Ghi nhận hoàn thành
  trackEvent('complete', { score: avgPct, duration });

  document.getElementById('mainContent').innerHTML = `
  <div class="cert-wrap">
    <div class="cert-title-bar">
      <h2>🏆 Giấy Chứng Nhận Của Bạn</h2>
      <p>Nhấn "Tải về" để lưu dưới dạng ảnh PNG</p>
    </div>
    <canvas id="certCanvas" width="1200" height="860"></canvas>
    <div class="cert-actions">
      <button class="btn btn-secondary" onclick="showWelcome()">← Về Trang Chủ</button>
      <button class="btn btn-gold" onclick="dlCert()">⬇️ Tải PNG</button>
      <button class="btn btn-primary" onclick="printCert()">🖨️ In Chứng Nhận</button>
    </div>
  </div>`;
  drawCert();
  renderSidebar();
}

function drawCert() {
  const cv = document.getElementById('certCanvas');
  const ctx = cv.getContext('2d');
  const W=1200, H=860;

  // Background
  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#f5fdf8'); bg.addColorStop(.5,'#ffffff'); bg.addColorStop(1,'#edf9f2');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Decorative border
  ctx.strokeStyle='#1a8a42'; ctx.lineWidth=10; ctx.strokeRect(18,18,W-36,H-36);
  ctx.strokeStyle='#c8973a'; ctx.lineWidth=2.5; ctx.strokeRect(30,30,W-60,H-60);

  // Corner ornaments
  [[54,54],[W-54,54],[54,H-54],[W-54,H-54]].forEach(([x,y])=>{
    ctx.fillStyle='#1a8a42'; ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c8973a'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,15,0,Math.PI*2); ctx.stroke();
  });

  // Header band
  const hg = ctx.createLinearGradient(0,58,W,58);
  hg.addColorStop(0,'#0f5c2b'); hg.addColorStop(.45,'#1a8a42'); hg.addColorStop(1,'#0f5c2b');
  ctx.fillStyle=hg; ctx.fillRect(42,58,W-84,108);

  // Load logo then continue
  const img = new Image();
  img.onload = ()=>{ ctx.drawImage(img,52,64,95,95); _finishCert(ctx,W,H); };
  img.onerror = ()=>{ _finishCert(ctx,W,H); };
  img.src = 'logo-phuc-tea.png';
}

function _finishCert(ctx, W, H) {
  const st = S._certStats;

  // Brand name in header
  ctx.textAlign='center';
  ctx.fillStyle='#f0c060'; ctx.font='bold 46px Georgia,serif';
  ctx.fillText('PHÚC TEA', W/2+20, 122);
  ctx.fillStyle='rgba(255,255,255,.72)'; ctx.font='15px Arial';
  ctx.fillText('HỆ THỐNG NHƯỢNG QUYỀN TRÀ & CÀ PHÊ', W/2+20, 152);

  // ── GIẤY CHỨNG NHẬN ──
  ctx.fillStyle='#0f5c2b'; ctx.font='bold 40px Georgia,serif';
  ctx.fillText('GIẤY CHỨNG NHẬN', W/2, 222);

  // Gold divider
  ctx.strokeStyle='#c8973a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(200,238); ctx.lineTo(W-200,238); ctx.stroke();

  // Sub-title
  ctx.fillStyle='#1a8a42'; ctx.font='bold 20px Arial';
  ctx.fillText(`Khóa Học: ${COURSE_TITLE}`, W/2, 272);

  // "Chứng nhận rằng"
  ctx.fillStyle='#6b7280'; ctx.font='italic 18px Georgia,serif';
  ctx.fillText('Chứng nhận Học viên', W/2, 316);

  // ── HỌ VÀ TÊN ──
  ctx.fillStyle='#0f5c2b'; ctx.font='bold 54px Georgia,serif';
  ctx.fillText(S.userName, W/2, 390);
  // underline
  const nw = ctx.measureText(S.userName).width;
  ctx.strokeStyle='#c8973a'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(W/2-nw/2,403); ctx.lineTo(W/2+nw/2,403); ctx.stroke();

  // Store / unit
  let bodyY = 446;
  if (S.userStore) {
    ctx.fillStyle='#374151'; ctx.font='italic 18px Georgia,serif';
    ctx.fillText(`(${S.userStore})`, W/2, bodyY); bodyY+=36;
  }

  // Completion sentence
  ctx.fillStyle='#374151'; ctx.font='18px Arial';
  ctx.fillText('đã hoàn thành xuất sắc khóa học', W/2, bodyY);
  ctx.fillStyle='#1a8a42'; ctx.font='bold 22px Arial';
  ctx.fillText(`"${COURSE_TITLE}"`, W/2, bodyY+34);
  ctx.fillStyle='#6b7280'; ctx.font='15px Arial';
  ctx.fillText('thuộc Hệ Thống Đào Tạo Phúc Tea – Chuỗi Cung Ứng 2026', W/2, bodyY+62);

  // ── STATS BOXES ──
  const sy = bodyY + 108;
  const stats = [
    [st.totalCorrect+'/'+st.totalQ, 'Câu trả lời đúng'],
    [st.avgPct+'%', 'Điểm trung bình'],
    [st.duration || '—', 'Thời gian hoàn thành'],
    ['6/6', 'Bài học']
  ];
  stats.forEach(([val, lbl], i)=>{
    const x = 180 + i*220;
    ctx.fillStyle='#f0fbf4';
    ctx.beginPath(); ctx.roundRect(x-80,sy-36,160,70,10); ctx.fill();
    ctx.strokeStyle='#a8dbb9'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#1a8a42'; ctx.font='bold 26px Arial'; ctx.fillText(val, x, sy);
    ctx.fillStyle='#6b7280'; ctx.font='12px Arial'; ctx.fillText(lbl, x, sy+20);
  });

  // ── DATE ──
  const now = new Date();
  const dateStr = `TP. Hồ Chí Minh, ngày ${now.getDate()} tháng ${now.getMonth()+1} năm ${now.getFullYear()}`;
  ctx.fillStyle='#6b7280'; ctx.font='italic 14px Georgia,serif';
  ctx.fillText(dateStr, W/2, H-178);

  // ── SIGNATURES ──
  // Left: Lý Tấn Tài
  const lx=240, rx=W-240;

  ctx.fillStyle='#374151'; ctx.font='bold 13px Arial';
  ctx.fillText('NGƯỜI KÝ XÁC NHẬN', lx, H-158);
  // Stylised signature for Lý Tấn Tài
  ctx.save();
  ctx.strokeStyle='#0f5c2b'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round';
  const sx0=lx-55, sy0=H-142;
  ctx.beginPath();
  ctx.moveTo(sx0,sy0+10); ctx.bezierCurveTo(sx0+15,sy0-18,sx0+28,sy0-18,sx0+36,sy0+5);
  ctx.bezierCurveTo(sx0+44,sy0+20,sx0+52,sy0+5,sx0+65,sy0);
  ctx.bezierCurveTo(sx0+80,sy0-14,sx0+90,sy0+8,sx0+110,sy0+4);
  ctx.stroke();
  ctx.restore();
  ctx.strokeStyle='#9ca3af'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(lx-70,H-110); ctx.lineTo(lx+70,H-110); ctx.stroke();
  ctx.fillStyle='#1a2e1a'; ctx.font='bold 14px Arial';
  ctx.fillText('Lý Tấn Tài', lx, H-94);
  ctx.fillStyle='#6b7280'; ctx.font='12px Arial';
  ctx.fillText('Giám Đốc Điều Hành – Phúc Tea', lx, H-76);

  // Right: Chuỗi Cung Ứng
  ctx.fillStyle='#374151'; ctx.font='bold 13px Arial';
  ctx.fillText('XÁC NHẬN HOÀN THÀNH', rx, H-158);
  ctx.strokeStyle='#9ca3af'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(rx-70,H-110); ctx.lineTo(rx+70,H-110); ctx.stroke();
  ctx.fillStyle='#1a2e1a'; ctx.font='bold 14px Arial';
  ctx.fillText('Trần Thị Hạnh Nhân', rx, H-94);
  ctx.fillStyle='#6b7280'; ctx.font='12px Arial';
  ctx.fillText('Trưởng Bộ Phận Chuỗi Cung Ứng', rx, H-76);

  // ── SEAL ──
  const scx=W/2, scy=H-100;
  const sg=ctx.createRadialGradient(scx,scy,0,scx,scy,46);
  sg.addColorStop(0,'#1a8a42'); sg.addColorStop(1,'#0f5c2b');
  ctx.beginPath(); ctx.arc(scx,scy,46,0,Math.PI*2);
  ctx.fillStyle=sg; ctx.fill();
  ctx.strokeStyle='#f0c060'; ctx.lineWidth=3; ctx.stroke();
  ctx.fillStyle='#f0c060'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
  ctx.fillText('PHÚC TEA',scx,scy-10);
  ctx.font='9px Arial';
  ctx.fillText('CHỨNG NHẬN',scx,scy+4);
  ctx.fillText('2026',scx,scy+16);

  // Bottom bar
  const fg=ctx.createLinearGradient(0,H-44,W,H-44);
  fg.addColorStop(0,'#0f5c2b'); fg.addColorStop(.5,'#1a8a42'); fg.addColorStop(1,'#0f5c2b');
  ctx.fillStyle=fg; ctx.fillRect(42,H-48,W-84,12);
}

function dlCert() {
  const a=document.createElement('a');
  a.download=`GiayChungNhan-PhucTea-${S.userName.replace(/ /g,'_')}.png`;
  a.href=document.getElementById('certCanvas').toDataURL('image/png');
  a.click();
}
function printCert() {
  const d=window.open('','_blank');
  d.document.write(`<html><head><title>Giấy Chứng Nhận – ${S.userName}</title>
  <style>body{margin:0}img{width:100%;height:auto}</style></head>
  <body><img src="${document.getElementById('certCanvas').toDataURL()}" onload="window.print()"></body></html>`);
  d.document.close();
}

  document.getElementById('progressText').textContent = '0/6 bài';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('mainContent').innerHTML = `
  <div style="max-width:520px;margin:24px auto">
    <div style="background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.09);overflow:hidden">
      <!-- Header -->
      <div style="background:linear-gradient(135deg,#0f5c2b,#1a8a42);padding:36px 40px;text-align:center">
        <img src="logo-phuc-tea.png" style="height:70px;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto"
          onerror="this.style.display='none'">
        <div style="color:#f0c060;font-size:22px;font-weight:900;letter-spacing:1px">PHÚC TEA</div>

      <div style="padding:36px 40px">
        <h2 style="font-size:20px;color:#0f5c2b;margin-bottom:6px;text-align:center">Đăng Ký Tham Gia Khóa Học</h2>
        <p style="color:#6b7280;font-size:13px;text-align:center;margin-bottom:28px;line-height:1.7">
          Vui lòng điền đầy đủ thông tin để bắt đầu khóa học<br>
          <strong style="color:#1a8a42">${COURSE_TITLE}</strong>
        </p>
        <div class="form-group">
          <label>Họ và tên đầy đủ <span style="color:#e53e3e">*</span></label>
          <input type="text" id="regName" placeholder="Nguyễn Văn A" oninput="checkReg()">
        </div>
        <div class="form-group">
          <label>Địa chỉ Email <span style="color:#e53e3e">*</span></label>
          <input type="email" id="regEmail" placeholder="example@email.com" oninput="checkReg()">
        </div>
        <div class="form-group">
          <label>Tên cửa hàng đầy đủ <span style="color:#e53e3e">*</span></label>
          <input type="text" id="regStore" placeholder="PHUCTEA163 - TÂN NINH TÂY NINH" oninput="checkReg()">
          <div style="font-size:11px;color:#9ca3af;margin-top:4px">Ví dụ: PHUCTEA163 - TÂN NINH TÂY NINH</div>
        </div>
        <button class="btn btn-primary" id="regBtn" disabled onclick="submitRegister()"
          style="width:100%;justify-content:center;font-size:15px;padding:14px;margin-top:4px">
          🚀 Bắt Đầu Khóa Học
        </button>

        </p>
      </div>
    </div>
  </div>`;
}

function checkReg() {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const store = document.getElementById('regStore').value.trim();
  const valid = name && email && store && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  document.getElementById('regBtn').disabled = !valid;
  document.getElementById('regBtn').className = valid ? 'btn btn-primary' : 'btn btn-disabled';
}

function submitRegister() {
  S.userName  = document.getElementById('regName').value.trim();
  S.userEmail = document.getElementById('regEmail').value.trim();
  S.userStore = document.getElementById('regStore').value.trim();
  trackEvent('register');
  showWelcome();
}

// ─── ADMIN PANEL ──────────────────────────────────────────────
function showAdmin() {
  const pwd = prompt('Nhập mật khẩu admin:');
  if (pwd !== ADMIN_PASSWORD) { alert('Sai mật khẩu!'); showRegister(); return; }

  const all = JSON.parse(localStorage.getItem('phuctea_learners') || '[]');
  const total = all.length;
  const done  = all.filter(r => r.status.includes('hoàn thành')).length;

  const rows = all.length ? all.map((r,i) => `
    <tr>
      <td style="text-align:center">${i+1}</td>
      <td><strong>${r.name}</strong></td>
      <td>${r.email}</td>
      <td>${r.store}</td>
      <td>${r.time}</td>
      <td><span style="padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;
        background:${r.status.includes('hoàn thành')?'#d1fae5':'#fef9c3'};
        color:${r.status.includes('hoàn thành')?'#065f46':'#92400e'}">${r.status}</span></td>
      <td style="text-align:center">${r.score||'—'}</td>
      <td>${r.duration||'—'}</td>
      <td>${r.completedAt||'—'}</td>
      <td style="text-align:center">
        <button onclick="deleteEntry('${r.email}')"
          style="background:#fee2e2;border:none;color:#dc2626;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:12px">Xoá</button>
      </td>
    </tr>`).join('') :
    `<tr><td colspan="10" style="text-align:center;padding:32px;color:#9ca3af">Chưa có học viên nào đăng ký</td></tr>`;

  document.getElementById('sidebar').innerHTML = '';
  document.getElementById('progressText').textContent = `${done}/${total} hoàn thành`;
  document.getElementById('progressFill').style.width = total ? (done/total*100)+'%' : '0%';

  document.getElementById('mainContent').innerHTML = `
  <div style="background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 16px rgba(0,0,0,.06)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <h2 style="font-size:20px;color:#0f5c2b">📊 Quản Lý Học Viên</h2>
        <p style="color:#6b7280;font-size:13px;margin-top:2px">Khóa học: ${COURSE_TITLE}</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div style="background:#f0fbf4;border:1px solid #a8dbb9;border-radius:10px;padding:10px 20px;text-align:center">
          <div style="font-size:24px;font-weight:800;color:#1a8a42">${total}</div>
          <div style="font-size:11px;color:#6b7280">Đã đăng ký</div>
        </div>
        <div style="background:#f0fbf4;border:1px solid #a8dbb9;border-radius:10px;padding:10px 20px;text-align:center">
          <div style="font-size:24px;font-weight:800;color:#1a8a42">${done}</div>
          <div style="font-size:11px;color:#6b7280">Hoàn thành</div>
        </div>
        <div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:10px 20px;text-align:center">
          <div style="font-size:24px;font-weight:800;color:#92400e">${total-done}</div>
          <div style="font-size:11px;color:#6b7280">Đang học</div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="exportCSV()">⬇️ Xuất CSV</button>
      <button class="btn btn-secondary" onclick="clearAll()">🗑️ Xoá Tất Cả</button>
      <button class="btn btn-secondary" onclick="showRegister()">← Thoát Admin</button>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:900px">
        <thead>
          <tr style="background:#0f5c2b;color:#fff">
            <th style="padding:10px 8px">#</th>
            <th style="padding:10px 12px;text-align:left">Họ tên</th>
            <th style="padding:10px 12px;text-align:left">Email</th>
            <th style="padding:10px 12px;text-align:left">Cửa hàng</th>
            <th style="padding:10px 12px;text-align:left">Đăng ký lúc</th>
            <th style="padding:10px 12px;text-align:left">Trạng thái</th>
            <th style="padding:10px 8px">Điểm TB</th>
            <th style="padding:10px 12px;text-align:left">TG học</th>
            <th style="padding:10px 12px;text-align:left">Hoàn thành lúc</th>
            <th style="padding:10px 8px"></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function deleteEntry(email) {
  if (!confirm('Xoá học viên này?')) return;
  const all = JSON.parse(localStorage.getItem('phuctea_learners') || '[]');
  localStorage.setItem('phuctea_learners', JSON.stringify(all.filter(r => r.email !== email)));
  showAdmin();
}

function clearAll() {
  if (!confirm('Xoá toàn bộ dữ liệu học viên? Không thể hoàn tác!')) return;
  localStorage.removeItem('phuctea_learners');
  showAdmin();
}

function exportCSV() {
  const all = JSON.parse(localStorage.getItem('phuctea_learners') || '[]');
  if (!all.length) { alert('Chưa có dữ liệu!'); return; }
  const header = ['Họ tên','Email','Cửa hàng','Đăng ký lúc','Trạng thái','Điểm TB','Thời gian học','Hoàn thành lúc'];
  const rows = all.map(r => [r.name,r.email,r.store,r.time,r.status,r.score,r.duration,r.completedAt]
    .map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = '\uFEFF' + [header.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
  a.download = `phuctea-hocvien-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ─── INIT ─────────────────────────────────────────────────────
if (location.hash === '#admin') showAdmin();
else showRegister();
</script>
